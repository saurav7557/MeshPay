# --- DEV PROFILE: H2 in-memory database ---
# Active by default. Lets anyone clone the repo and run it with zero setup —
# no Docker, no Postgres install needed. Data is wiped on every restart.

spring.datasource.url=jdbc:h2:mem:upimesh
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

# H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
