# --- PROD PROFILE: PostgreSQL ---
# Activated by setting SPRING_PROFILES_ACTIVE=prod (Docker Compose and the
# live deployment both do this). Connection details come entirely from
# environment variables — nothing is hardcoded, so the same image runs
# locally via Compose or on Render/Railway just by changing env vars.

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:upimesh}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:upimesh}
spring.datasource.password=${DB_PASSWORD:upimesh}

# 'validate' (not 'update' or 'create-drop') — in real production you'd run
# migrations explicitly (e.g. Flyway) rather than let Hibernate touch schema.
# For this project's scope, 'update' is the pragmatic middle ground: it
# creates tables on first boot but won't silently drop data on restart.
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=false
