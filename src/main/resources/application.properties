# Server
server.port=${PORT:8080}

# Active profile: 'dev' (default, H2 in-memory, zero setup) or 'prod' (PostgreSQL)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JPA — dialect is auto-detected by Hibernate from the driver, no need to set it
spring.jpa.show-sql=false

# Logging
logging.level.com.demo.upimesh=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Idempotency window (how long a packet hash is remembered)
upi.mesh.idempotency-ttl-seconds=86400

# Packet freshness window — anything older than this is rejected as replay
upi.mesh.packet-max-age-seconds=86400

# Swagger UI at /swagger-ui.html, OpenAPI JSON at /v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
